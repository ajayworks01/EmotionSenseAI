services:
  - type: web
    name: emotionsense-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: emotionsense-db
          property: connectionString

databases:
  - name: emotionsense-db
    databaseName: emotionsense
    user: emotionsense_user
    plan: free
